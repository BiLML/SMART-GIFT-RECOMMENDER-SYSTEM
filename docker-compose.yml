services:
  db:
    image: postgres:15-alpine
    container_name: smartbookdb
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - book_network 

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: smartbookbackend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - book_network
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
networks:
  book_network:
    driver: bridge

volumes:
  postgres_data: