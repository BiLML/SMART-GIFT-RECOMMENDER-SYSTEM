services:
  db:
    image: postgres:15-alpine
    container_name: smartbookdb
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - book_network

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: smartbookbackend
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - book_network
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartbookfrontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - book_network
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

networks:
  book_network:
    driver: bridge

volumes:
  postgres_data:
